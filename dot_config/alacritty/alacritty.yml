# ~/.config/alacritty/alacritty.yml
font:
  normal:
    family: Berkeley Mono 
    style: Regular

  bold:
    family: Berkeley Mono
    style: Bold

  italic:
    family: Berkeley Mono
    style: Italic

  bold_italic:
    family: Berkeley MOno
    style: Bold Italic

  size: 14

# Colors Ef-Bio
colors:
  normal:
    black: '#222522'
    red: '#ef6560'
    green: '#3fb83f'
    yellow: '#d4aa02'
    blue: '#37aff6'
    magenta: '#d38faf'
    cyan: '#6fc5ef'
    white: '#cfdfd5'
  bright:
    black: '#505250'
    red: '#ff778f'
    green: '#00c089'
    yellow: '#cfc04f'
    blue: '#32cfef'
    magenta: '#af9fff'
    cyan: '#5dc0aa'
    white: '#808f80'
  cursor:
    cursor: '#35f038'
    text: '#111111'
  primary:
    background: '#111111'
    foreground: '#cfdfd5'
  selection:
    background: '#3a3027'
    text: '#cfdfd5'